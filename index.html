<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI Pose Camera</title>


<link rel="icon" href="data:,">


<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1"></script>


<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
background:#f0f0f0;
padding:20px;
}

button{
font-size:18px;
padding:10px 20px;
margin-top:15px;
}

canvas{
border:2px solid black;
margin-top:20px;
}

#label-container{
margin-top:15px;
font-size:20px;
}

</style>

</head>

<body>

<h2>AI Pose Detection</h2>

<button onclick="init()">Start Camera</button>

<br>

<canvas id="canvas"></canvas>

<div id="label-container"></div>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/e-gQIohsI/";

let model, webcam, ctx, labelContainer, maxPredictions;

async function init() {

const modelURL = URL + "model.json";
const metadataURL = URL + "metadata.json";

model = await tmPose.load(modelURL, metadataURL);
maxPredictions = model.getTotalClasses();

const size = 400;
const flip = true;

webcam = new tmPose.Webcam(size, size, flip);
await webcam.setup();
await webcam.play();

window.requestAnimationFrame(loop);

const canvas = document.getElementById("canvas");
canvas.width = size;
canvas.height = size;

ctx = canvas.getContext("2d");

labelContainer = document.getElementById("label-container");
labelContainer.innerHTML = "";

for (let i = 0; i < maxPredictions; i++) {
labelContainer.appendChild(document.createElement("div"));
}

}

async function loop() {

webcam.update();
await predict();
window.requestAnimationFrame(loop);

}

async function predict() {

const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
const prediction = await model.predict(posenetOutput);

for (let i = 0; i < maxPredictions; i++) {

const classPrediction =
prediction[i].className + " : " +
(prediction[i].probability * 100).toFixed(1) + "%";

labelContainer.childNodes[i].innerHTML = classPrediction;

}

drawPose(pose);

}

function drawPose(pose) {

ctx.drawImage(webcam.canvas, 0, 0);

if (pose) {

const minPartConfidence = 0.5;

tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);

}

}

</script>

</body>
</html>
