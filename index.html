<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI ตรวจจับท่าทาง</title>

<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
padding:20px;
}

h1{
color:#1e40ff;
font-size:40px;
}

canvas{
border:3px solid black;
margin-top:20px;
}

#result{
font-size:50px;
margin-top:20px;
font-weight:bold;
}

button{
margin-top:30px;
padding:12px 25px;
font-size:18px;
background:#1e40ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0f2bd6;
}

</style>

</head>

<body>

<h1>AI ตรวจจับ ยืน หรือ นั่ง</h1>

<canvas id="canvas"></canvas>

<div id="result">กำลังโหลด AI...</div>

<button onclick="window.location.href='https://sites.google.com/view/yousda/%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%81%E0%B8%A3%E0%B8%81'">
ไปยังหน้าเว็บไซต์หลัก
</button>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/e-gQIohsI/";

let model, webcam, ctx;

async function init(){

const modelURL = URL + "model.json";
const metadataURL = URL + "metadata.json";

model = await tmPose.load(modelURL, metadataURL);

const size = 400;
const flip = true;

webcam = new tmPose.Webcam(size, size, flip);
await webcam.setup();
await webcam.play();

window.requestAnimationFrame(loop);

const canvas = document.getElementById("canvas");
canvas.width = size;
canvas.height = size;

ctx = canvas.getContext("2d");

}

async function loop(){

webcam.update();
await predict();
window.requestAnimationFrame(loop);

}

async function predict(){

const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
const prediction = await model.predict(posenetOutput);

let best = prediction[0];

for(let i=0;i<prediction.length;i++){
if(prediction[i].probability > best.probability){
best = prediction[i];
}
}

document.getElementById("result").innerHTML =
best.className + " " + (best.probability*100).toFixed(0) + "%";

drawPose(pose);

}

function drawPose(pose){

ctx.drawImage(webcam.canvas,0,0);

if(pose){

tmPose.drawKeypoints(pose.keypoints,0.5,ctx);
tmPose.drawSkeleton(pose.keypoints,0.5,ctx);

}

}

init();

</script>

</body>
</html>
